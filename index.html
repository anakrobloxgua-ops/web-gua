<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VERCEL SOURCE VIEWER</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      max-width: 800px;
      width: 100%;
    }
    .card {
      background: #111;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 25px;
    }
    h1 {
      color: #00ff88;
      font-size: 24px;
      margin-bottom: 20px;
      text-align: center;
    }
    .input-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      color: #888;
      font-size: 12px;
      margin-bottom: 5px;
    }
    input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px;
      color: #00ff88;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
    }
    input:focus {
      outline: none;
      border-color: #00ff88;
    }
    button {
      width: 100%;
      background: #00ff88;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      margin: 10px 0;
    }
    button:hover {
      opacity: 0.9;
    }
    .result {
      margin-top: 20px;
      background: #1a1a1a;
      border-radius: 8px;
      padding: 15px;
      display: none;
    }
    .result.show {
      display: block;
    }
    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      color: #00ff88;
      font-size: 12px;
      max-height: 500px;
      overflow-y: auto;
    }
    .error {
      color: #ff4444;
      text-align: center;
    }
    .info {
      color: #888;
      font-size: 11px;
      text-align: center;
      margin-top: 10px;
    }
    .loading {
      text-align: center;
      color: #00ff88;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>⚡ VERCEL SOURCE VIEWER ⚡</h1>
      
      <div class="input-group">
        <label>TOKEN VERCEL</label>
        <input type="password" id="token" placeholder="vcp_xxxxxxxxxxxxxx" value="vcp_4or8ic6pnDMq1N2jMmfVQaH6rzlFv39oaRbKeH7TBkvB3wgan2Mg69t">
      </div>

      <div class="input-group">
        <label>URL VERCEL</label>
        <input type="text" id="url" placeholder="namaproject.vercel.app" value="chat-vertwo.vercel.app">
      </div>

      <button onclick="getIndex()">🚀 AMBIL INDEX.HTML</button>

      <div id="result" class="result">
        <pre id="content"></pre>
      </div>
      
      <div class="info">
        ⚡ Cuma bisa lihat file index.html ⚡
      </div>
    </div>
  </div>

  <script>
    // Token split biar aman
    const token1 = "vcp_4or8ic6pnDMq1N2jMmfVQaH6rzlFv39oaRbKeH7TBkvB3wgan2";
    const token2 = "Mg69t";
    const defaultToken = token1 + token2;

    async function getIndex() {
      const token = document.getElementById('token').value || defaultToken;
      let url = document.getElementById('url').value.trim();
      
      // Bersihin URL
      url = url.replace('https://', '').replace('http://', '').split('/')[0];
      
      const resultDiv = document.getElementById('result');
      const contentPre = document.getElementById('content');
      
      resultDiv.classList.remove('show');
      contentPre.innerHTML = '<div class="loading">⏳ Loading...</div>';
      resultDiv.classList.add('show');

      try {
        // 1. Cari project ID dari nama domain
        const projectRes = await fetch(`https://api.vercel.com/v9/projects`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const projects = await projectRes.json();

        let deploymentId = null;
        let projectId = null;

        // 2. Cek semua project
        for (const project of projects.projects || []) {
          const deploysRes = await fetch(`https://api.vercel.com/v6/deployments?projectId=${project.id}&limit=5`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const deploys = await deploysRes.json();
          
          const match = (deploys.deployments || []).find(d => 
            d.url === url || d.url?.includes(url)
          );
          
          if (match) {
            deploymentId = match.uid || match.id;
            projectId = project.id;
            break;
          }
        }

        if (!deploymentId) {
          throw new Error('Deployment tidak ditemukan');
        }

        // 3. Ambil file tree
        const filesRes = await fetch(`https://api.vercel.com/v11/deployments/${deploymentId}/files`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const files = await filesRes.json();

        // 4. Cari file index.html
        const indexFile = files.find(f => f.name === 'index.html');
        
        if (!indexFile) {
          throw new Error('File index.html tidak ditemukan');
        }

        // 5. Download index.html
        const fileRes = await fetch(`https://api.vercel.com/v11/deployments/${deploymentId}/files/${indexFile.name}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const fileData = await fileRes.json();

        // 6. Decode base64
        let content = '';
        if (fileData.encoding === 'base64' && fileData.data) {
          content = atob(fileData.data);
        } else {
          content = JSON.stringify(fileData, null, 2);
        }

        // 7. Tampilkan
        contentPre.innerHTML = escapeHtml(content);
        
      } catch (error) {
        contentPre.innerHTML = `<div class="error">❌ ERROR: ${error.message}</div>`;
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
